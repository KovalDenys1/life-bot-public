name: Scheduled cron jobs

# NOTE: This is an example workflow for reference only.
# Schedule is disabled in this public repo â€” runs only via manual dispatch.
# The actual scheduled runs happen in the private deployment repo.
on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - friday
          - weekly-report

jobs:
  morning:
    if: github.event.inputs.job == 'morning'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /morning
        run: |
          curl -f --max-time 120 \
            -H "X-Cron-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            "${{ secrets.APP_URL }}/morning"

  evening:
    if: github.event.inputs.job == 'evening'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /evening
        run: |
          curl -f --max-time 120 \
            -H "X-Cron-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            "${{ secrets.APP_URL }}/evening"

  friday:
    if: github.event.inputs.job == 'friday'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /friday
        run: |
          curl -f --max-time 120 \
            -H "X-Cron-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            "${{ secrets.APP_URL }}/friday"

  weekly-report:
    if: github.event.inputs.job == 'weekly-report'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /weekly-report
        run: |
          curl -f --max-time 120 \
            -H "X-Cron-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            "${{ secrets.APP_URL }}/weekly-report"